                $ref: '#/components/schemas/EventTypeResponse'
        _links:
          $ref: '#/components/schemas/PagingLinks'
        page:
          $ref: '#/components/schemas/Page'

    QueryEventsResponse:
      type: object
      properties:
        _embedded:
          type: object
          properties:
            events:
              type: array
              items:
                $ref: '#/components/schemas/MindsphereStandardEventResponse'
        _links:
          $ref: '#/components/schemas/PagingLinks'
        page:
          $ref: '#/components/schemas/Page'

    JobResource:
      type: object
      properties:
        id:
          description: Unique identifier of the job
          type: string
          format: uuid
          readOnly: true
        state:
          description: State of the job
          type: string
          enum: [ACCEPTED, IN_PROGRESS, FINISHED, FINISHED_WITH_ERROR]
          default: ACCEPTED

    DeleteJobResource:
      allOf:
        - $ref: '#/components/schemas/JobResource'
        - type: object
          properties:
            details:
              $ref: '#/components/schemas/deleteJobDetails'
      example:
        {
          "id": "3ecc3658-96bb-47ff-93b3-93afd640ee10",
          "state": "FINISHED",
          "details": {
            "resultCode": "200",
            "resultDescription": "3 events deleted"
          }
        }

    CreateJobResource:
      allOf:
        - $ref: '#/components/schemas/JobResource'
        - type: object
          properties:
            details:
              $ref: '#/components/schemas/createJobDetails'
      example:
        {
          "id": "uuid",
          "state": "FINISHED_WITH_ERROR",
          "details":{
            "resultDescription":[
            {
              "event": {
                "typeId": "3cb8c2b1-f72e-43fa-ae39-ee9de14b8f26",
                "correlationId": "3ecc3658-96bb-47ff-93b3-93afd640ee10",
                "timestamp": "2018-01-09T13:40:23.438Z",
                "customStringField": "customValue",
                "customIntegerField": 10
              },
              "resultCode": "400",
              "errorMessage": "missing entity Id"},
            {
              "event": {
                "id": "ae71ee1b-3454-4338-8def-a16028db08b0",
                "typeId": "3cb8c2b1-f72e-43fa-ae39-ee9de14b8f26",
                "correlationId": "3ecc3658-96bb-47ff-93b3-93afd640ee10",
                "entityId": "50fd8ab5-23b3-45f7-aca1-12b0b186707b",
                "timestamp": "2018-01-09T13:40:23.438Z",
                "etag": 0,
                "_links": {
                  "self": {
                    "href": "string"
                  }
                },
                "customStringField": "customValue",
                "customIntegerField": 10
              },
              "resultCode": "201"
            }
            ]
          }
        }

    deleteEventsJob:
      type: object
      required:
        - filter
      properties:
        filter:
          description: |
            - The `timestamp` property can be filtered by `before`, `after` and `between` functions.
            - At least `typeId` property must be provided in filter expression.
            - Multiple `typeId` expressions (by using and, or logical operators) in filter parameter is not allowed. Only equality function is supported on it.
            - Negation of `typeId` in filter expression is not allowed.
          type: object
          format: json

    createEventsJob:
      type: object
      required:
        - events
      properties:
        events:
          description: |
            - List of events to create
          type: array
          items:
            $ref: '#/components/schemas/CustomEvent'

    deleteJobDetails:
      description: Details about the job in case of FINISHED and FINISHED_WITH_ERROR
      type: object
      properties:
        resultCode:
          description: status code describes the job's execution result
          type: string
        resultDescription:
          description: |
            information about
            - how many events deleted or
            - what error happened
          type: string

    createJobDetails:
      description: Details about the job in case of FINISHED and FINISHED_WITH_ERROR
      type: object
      properties:
        resultDescription:
          type: array
          items:
            $ref: '#/components/schemas/createEventDetailedDescription'

    createEventDetailedDescription:
      description: Details about an event within a bulk create job
      type: object
      properties:
        event:
          description: created event resource or the input event in case of failure
          type: string
          format: json
        resultCode:
          description: status code of event creation
          type: string
        errorMessage:
          description: details about failing event creation
          type: string

    Field:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        filterable:
          type: boolean
          default: false
        required:
          type: boolean
          default: false
        updatable:
          type: boolean
          default: false
        type:
          type: string
          enum: [STRING, INTEGER, DOUBLE, BOOLEAN, LINK, TIMESTAMP, UUID, ENUM]
          description: Note that the LINK type is not a plain HREF. The value for the LINK type should be given between quotation marks.
        values:
          type: array
          items:
            type: string
          description: This field is applicable only if the field's type is ENUM, otherwise it should be skipped. The values must be strings.

    Errors:
      type: array
      items:
        type: object
        properties:
          logref:
            type: string
            format: uuid
          message:
            type: string
        example:
          logref: c27a28b6eb16b507fabc11e75da8b4ce
          message: Some meaningful message about the problems origin

    ApiRateErrors:
      type: array
      items:
        type: object
        properties:
          message:
            type: string
        example:
          message: API rate limit exceeded

    Page:
      type: object
      properties:
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer

    PagingLinks:
      type: object
      properties:
        first:
          $ref: '#/components/schemas/rel.first'
        self:
          type: object
          title: Self link
          properties:
            href:
              type: string
              format: uri
            templated:
              type: boolean
              example: true
        next:
          $ref: '#/components/schemas/rel.next'
        prev:
          $ref: '#/components/schemas/rel.prev'
        last:
          $ref: '#/components/schemas/rel.last'

    SharingResource:
      type: object
      description: >-
        Contains sharing information.
        This sharing information will be available only if 'includeShared' query parameter is 'true' in request.
      properties:
        modes:
          type: array
          description: >-
            List of sharing modes applicable for this resource. The currently supported modes are SHARER, RECEIVER and DEFAULT.
            SHARER means this resource is shared by my tenant.
            RECEIVER means this resource is shared with my tenant.
            DEFAULT means this resource is provide by default.
            An empty array means this resource is not shared.
            New modes might be introduced later and clients must expect additional items to be contained in the array.
          items:
            type: string
            enum: [ SHARER, RECEIVER, DEFAULT ]


    rel.self:
      type: object
      title: Self link
      properties:
        href:
          type: string
          format: uri
    rel.first:
      type: object
      title: Link to first page
      properties:
        href:
          type: string
          format: uri
    rel.next:
      type: object
      title: Link to next page
      properties:
        href:
          type: string
          format: uri
    rel.prev:
      type: object
      title: Link to the previous page
      properties:
        href:
          type: string
          format: uri
    rel.last:
      type: object
      title: Link to last page
      properties:
        href:
          type: string
          format: uri
    rel.events:
      type: object
      title: Link to events belonging to this event type
      properties:
        href:
          type: string
          format: uri

  parameters:
    size:
      name: size
      in: query
      description: |
        Specifies the number of elements in a page. Default is 20, minimum is 1 , **maximum is 500**.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 500
        default: 20
    sizeET:
      name: size
      in: query
      description: |
        Specifies the number of elements in a page. Default is 20, minimum is 1 , **maximum is 100**.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
    page:
      name: page
      in: query
      description: |
        Specifies the requested page index. Default is 0
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    eventFilter:
      name: filter
      in: query
      description: |
        description: |
        Filter parameter (JSON) encoded format. Events can be filtered by the following fields
          - `timestamp`
          - `typeId`
          - `correlationId`
          - `entityId`
          - `code`
          - `severity`
          - `source`
          - `acknowledged`
          - `assetTypeId`
          - `parentAssetId`
          - Other custom filters, based on filterable field in custom EventType can also be used.

          Following conditions apply for filtering events,
          - If `timestamp` is not provided in the filter, the events from the 7 days will be filtered for by default.
          - The `timestamp` property can be filtered by `before`, `after` and `between` functions.
          - Multiple `typeId` expressions (by using and, or logical operators) in filter parameter is not allowed. Only equality function is supported on it.
          - Filtering with typeId having `BaseEvent` is not supported. If typeId is missing from filter expression then `MindsphereStandardEvent` typed (including) descendants - polymorphic query) events will be returned.
          - Negation of `typeId` in filter expression is not allowed.
          - If there are multiple events that have the same `correlationId`, `entityId` and `typeId` then only the latest one will be present in the returning list of events if `history` is false (false is default value).
          - Negation of `assetTypeId` in filter expression is not allowed.
          - Only equality and IN function (with max 5 values) in filter are allowed with `assetTypeId`.
          - Negation of 'parentAssetId' in filter expression is not allowed.
          - Only equality function in filter is allowed with `parentAssetId`.
      schema:
        type: string
        format: json
    eventTypeFilter:
      name: filter
      in: query
      description: |
        Filter parameter (JSON) encoded format. Event types can be filtered by the following fields
        - `id`
        - `name`
        - `owner`
        - `scope`
      schema:
        type: string
        format: json
    eventSort:
      name: sort
      in: query
      description: |
        Order in which events are returned. Supported only on filterable fields. Default is `timestamp` descending order
      schema:
        type: string
        format: json
    eventTypeSort:
      name: sort
      in: query
      description: |
        Order in which event types are returned. Supported only on filterable fields. Default is `name` ascending order
      schema:
        type: string
        format: json
    eventHistory:
      name: history
      in: query
      description: |
        Optional paramater, if we want to retrieve the history of an event which is based on using the same correlationID, entityID, typeID.
        If the latest event instance in a history of an event is deleted then the history of the event will be deleted.
      schema:
        type: boolean
        default: false
    eventId:
      name: eventId
      in: path
      description: ID of an event
      required: true
      schema:
        type: string
        format: uuid
    ifMatch:
      name: If-Match
      in: header
      description: Used for optimistic concurrency control
      required: true
      schema:
        type: integer
        format: int32
    ifNoneMatch:
      name: If-None-Match
      in: header
      description: ETag hash of previous request to allow caching
      schema:
        type: string
    eventTypeId:
      name: eventTypeId
      in: path
      description: ID of an event type
      required: true
      schema:
        type: string
    jobId:
      name: jobId
      in: path
      description: ID of a job
      required: true
      schema:
        type: string
        format: uuid
    includeShared:
      name: includeShared
      in: query
      description: >-
        To specify if received event or eventTypes should be consider for the API operation.
      schema:
        type: boolean
        default: false
    enablePageCache:
      name: enablePageCache
      in: query
      description: >-
        To specify if page caching is enabled or not. This property enables faster fetching of events from multiple pages for same filter criteria.
      schema:
        type: boolean
        default: false
    excludeGlobal:
      name: excludeGlobal
      in: query
      description: >-
        If set to true, the response will include all the event types created only by the tenant along with the Mindsphere's core event types.
      schema:
        type: boolean
        default: false

  responses:
    304StandardResponse:
      description: Not Modified
    403ErrorForbiddenResponse:
      description: |
        The user does not have the right permission
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseCreateEvent:
      description: |
        The request will return 400 BAD REQUEST in cases you can find below.
        - severity is not between the 1-99 number range
        - code is longer than 16 characters
        - source is longer than 255 characters
        - description is longer than 255 characters
        - entityId is not given in the request
        - timestamp is not given in the request body
        - timestamp is not a valid UTC timestamp
        - timestamp plus the TTL (defined by the event's type) is less than the current timestamp
        - correlationId is longer than 36 characters
        - provided entityId is shared and owned by other tenant

        Custom Events
        - creating event having base event type
        - required field is missing
        - incompatible value to a custom field
        - UUID typed field receiving invalid value
        - provided typeId is shared eventType with Local Scope owned by other tenant
        - string length should not be greater than 255
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseBulkDeleteEvent:
      description: |
        The request will return 400 BAD REQUEST if filter is not valid JSON or there is no 'typeId' in the filter expression
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseBulkCreateEvent:
      description: |
        The request will return 400 BAD REQUEST if there are more than 150 events in the payload
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404ErrorResponseCreateEvent:
      description: |
        The request will return 404 NOT FOUND in cases you can find below.
        - The given event type does not exist
        - The given entity Id does not exist
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404ErrorResponseGetEventById:
      description: |
        The request will return 404 NOT FOUND in cases you can find below.
        - There is no event stored in the database with the given event ID
        - The given entity Id does not exist
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404ErrorResponseGetJobById:
      description: Not Found
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseGetEvent:
      description: |
        The request will return 400 BAD REQUEST in cases you can find below.
        - Not filterable field is present in the filter expression
        - Sorting events by a not sortable field
        - BaseEvent type is present in the filter expression's typeId parameter
        - `size` parameter is larger than 500
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseUpdateEvent:
      description: |
        The request will return 400 BAD REQUEST in cases you can find below.
        - Updating a field with invalid value
        - Updating fields that are not updatable (typeId, correlationId, timestamp, entityId, etc.)
        - Updating without required field in input
        - Updating without typeId
        - Updating a required field to null
        - Updating a custom field with incompatible type
        - Updating shared event owned by another tenant
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404ErrorResponseUpdateEvent:
      description: |
        The request will return 404 BAD REQUEST in cases you can find below.
        - Updating non-existing event
        - The given entity Id does not exist
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseCreateEventType:
      description: |
        The request will return 400 BAD REQUEST in cases you can find below.
        - reserved words of MySQL and Java cannot be used as event type or field name
        - provided id is not compliant with the following format: <tenant>.<idFragment1>[.<idFragment2>..]
        - provided id is longer than 64 characters
        - provided id contains special characters (only alphanumeric characters allowed)
        - name of the event type is missing
        - ttl is bigger than 1825
        - type of a field is missing
        - name of the event type should not be from following reserved names: AgentBaseEvent, DataSourceEvent
        - name of the event type longer than 64 characters
        - field name is duplicated
        - field name is longer than 64 characters
        - number of fields are more than 100
        - inheritance depth exceeds 4
        - definition of field property is missing
        - filterable fields are more than 10
        - field of `LINK` type is filterable
        - want to create event type with GLOBAL scope which has parent event type with LOCAL scope
        - `values` definition
          - is missing or empty in case of ENUM field type, or it is present in case of any other type than ENUM.
          - holds other types than string
          - contains duplicated members
          - contains enum members longer than 36 characters
        - provided parentId is shared eventType with LOCAL scope and owned by other tenant
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseUpdateEventType:
      description: |
        The request will return 400 BAD REQUEST in cases you violate any of the below circumstances.
        - The event type can be updated only by the owner.
        - More than 300.000 events exist based on the event type that the user wants to update.
        - Changing event type scope from `GLOBAL` to `LOCAL` is only possible when there are no events created
          from the event type which belongs to another tenant than the event type was created from.
        - The additional fields cannot be required.
        - A required field can be turned into an optional field by an update but the opposite operation is not allowed.
        - The type of a custom field cannot be changed.
        - The filterable property of a custom field can be changed to 'true' but the opposite operation is not allowed.
        - The owner of the event type cannot be changed.
        - The parent of the event type cannot be changed.
        - An event type can only be modified if there are no child event types derived from; except for the operation of ttl update.
        - `BaseEvent` and `MindSphereStandardEvent` cannot be updated.
        - Receiver tenant can not modify shared eventType owned by other tenant.
        - `values` definition
                - is missing or empty in case of ENUM field type, or it is present in case of any other type than ENUM.
                - holds other types than string
                - contains duplicated members
                - contains enum members longer than 36 characters
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseDeleteEventType:
      description: |
        The request will return 400 BAD REQUEST in cases you violate any of the below circumstances.
        - BaseEvent and StandardEvent cannot be deleted.
        - The event type can be deleted only by the owner.
        - Only event types can be deleted which does not have child event types.
        - Only event types without any corresponding events can be deleted.
        - Receiver tenant can not delete shared eventType owned by other tenant.
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404ErrorResponseUpdateEventType:
      description: |
        The request will return 404 BAD REQUEST in cases you can find below.
        - Updating non-existing eventtype
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404ErrorResponseGetEventTypeById:
      description: |
        The request will return 404 BAD REQUEST in cases you can find below.
        - There is no event type stored in the database with the given event type ID
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404ErrorResponseDeleteEventTypeById:
      description: |
        The request will return 404 BAD REQUEST in cases you can find below.
        - There is no event type stored in the database with the given event type ID
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    400ErrorResponseGetEventType:
      description: |
        The request will return 400 BAD REQUEST in cases you can find below.
        - Filter event types by a not filterable field
        - Sorting event types by a not sortable field
        - `size` parameter is larger than 100
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    401StandardErrorResponse:
      description: Unauthorized
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    404StandardErrorResponse:
      description: Not Found
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    409StandardErrorResponse:
      description: Conflict
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    409ErrorResponseUpdateEventType:
      description: |
        The request will return 409 CONFLICT in cases you can find below.
        - Concurrent modification of the same event type
        - Concurrent event deletion on the same event type
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    409ErrorResponseDeleteEventType:
      description: |
        The request will return 409 CONFLICT in cases you can find below.
        - Event type is changed by another user, and etag is different then provided in the `If-Match` header
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    409ErrorResponseCreateEventType:
      description: |
        The request will return 409 CONFLICT in cases you can find below.
        - An event type already exists with the given id
        - An event type already exists with the given name for the tenant
        - Field already exists in one of the parent event types
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    412StandardErrorResponse:
      description: Precondition Failed
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/Errors'
    429StandardErrorResponse:
      description: Too Many Requests
      content:
        application/vnd.error+json:
          schema:
            $ref: '#/components/schemas/ApiRateErrors'
