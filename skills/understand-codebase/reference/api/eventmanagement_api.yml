openapi: 3.1.0

info:
  title: Event Management API
  description: Event Management allows users to create, read, update and delete Events and Event Types
  version: '3.17.0'
  x-visibility: external

servers:
  - url: https://api.eu1.siemens.app/eventmanagement-1000001700/v3
    description: Xcelerator compliant URL
  - url: https://gateway.eu1.mindsphere.io/api/eventmanagement/v3
    description: IH compliant URL

tags:
  - name: event management billboard
    description: Event management billboard operations
  - name: events
    description: Event operations
  - name: event types
    description: Event type operations
  - name: jobs
    description: Job operations

paths:
  /:
    get:
      operationId: infoAPI
      summary: Info about the API
      description: Ideally, the billboard URI is the only address a REST client needs to know. From there onwards, it must be able to discover all other URIs of the service by using the returned
      tags:
        - event management billboard
      security:
        - event:
            - em.r
      responses:
        '200':
          description: ok
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'

  /events:
    post:
      operationId: createEvent
      summary: Create new event
      description: |
        Creates an event with the provided content (`Event` model can be used).

        \
        If no `typeId` is given in the request, then a `MindsphereStandardEvent` will be created. A standard event has 5 additional fields beside the fields defined in the `Event` data model
          - `description` (string, not required, not filterable, updatable)
          - `severity` (integer, not required, filterable, updatable)
          - `code` (string, not required, filterable, updatable)
          - `source` (string, not required, filterable, updatable)
          - `acknowledged` (boolean, not required, filterable, updatable)

        If there is a valid `typeId` in the request body then the event DTO must match to the corresponding event type given by the `typeId`. All the required fields from given 'typeId' and its parent eventTypes in the hierarchy should be included in the event payload when creating a custom event

        \
        **!Restriction!**
        - **After successful response, it may take 100ms to make it visible to the user.**
      tags:
        - events
      security:
        - event:
            - em.c
          eventType:
            - em.et.r
      parameters:
        - $ref: '#/components/parameters/includeShared'
      requestBody:
        description: Event content to be created or updated
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomEvent'
      responses:
        '201':
          description: Created
          headers:
            Location:
              schema:
                type: string
              description: URL of the resource
            ETag:
              schema:
                type: string
              description: Incremental counter for optimistic concurrency control
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/CustomEventCreated'
        '400':
          $ref: '#/components/responses/400ErrorResponseCreateEvent'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseCreateEvent'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

    get:
      operationId: queryEvents
      summary: Query events
      description: |
        Returns events based on the request parameters. If no `typeId` is given in the filter expression then `MindsphereStandardEvent` typed events (and its descendants excluding descendant specific fields) will be returned.

        \
        **Note:**
        **Clients must always expect incompleteness of the list of returned events, as internal processing is limited by eventual consistency.**
      security:
        - event:
            - em.r
      tags:
        - events
      parameters:
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/eventFilter'
        - $ref: '#/components/parameters/eventSort'
        - $ref: '#/components/parameters/ifNoneMatch'
        - $ref: '#/components/parameters/eventHistory'
        - $ref: '#/components/parameters/includeShared'
        - $ref: '#/components/parameters/enablePageCache'
      responses:
        '200':
          description: A page of events.
          headers:
            ETag:
              schema:
                type: string
              description: The hash of the response's content
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/QueryEventsResponse'
        '304':
          $ref: '#/components/responses/304StandardResponse'
        '400':
          $ref: '#/components/responses/400ErrorResponseGetEvent'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

  /events/{eventId}:
    get:
      operationId: retrieveEvent
      summary: Get an event
      description: |
        Returns an event by ID.
      tags:
        - events
      security:
        - event:
            - em.r
      parameters:
        - $ref: '#/components/parameters/eventId'
        - $ref: '#/components/parameters/ifNoneMatch'
        - $ref: '#/components/parameters/includeShared'
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
              description: The hash of the response's content
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/CustomEventResponse'
        '304':
          $ref: '#/components/responses/304StandardResponse'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseGetEventById'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'
    put:
      operationId: updateEvent
      summary: Update an event
      description: |
        Update an existing event by ID.

        \
        If user wants to have history of an event, it can be done to use POST request having the same `typeId`, `correlationId` and `entityId` in the payload.

        \
        **!Restriction!**
        - **PUT endpoint can only be used for content adjustments (corrections) but not for status changes (e.g. tickets use case). The time range for changes (updating an event by ID) might be limited in upcoming versions.**
        - **Recommended usage for status changes is the update simulation based on an existing event's correlation ID and entity ID via POST endpoint.**
        - **After successful response, it may take 100ms to make it visible to the user.**
        - **The following fields are required and their value cannot be changed**
          - **`correlationId`**
          - **`timestamp`**
          - **`entityId`**
        - **`typeId` cannot be changed, and is required for Custom events**
      tags:
        - events
      security:
        - event:
            - em.u
          eventType:
            - em.et.r
      parameters:
        - $ref: '#/components/parameters/eventId'
        - $ref: '#/components/parameters/ifMatch'
        - $ref: '#/components/parameters/includeShared'
      requestBody:
        description: Event content to be created or updated
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomEvent'
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              schema:
                type: string
              description: Incremental counter for optimistic concurrency control
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/CustomEventUpdated'
        '400':
          $ref: '#/components/responses/400ErrorResponseUpdateEvent'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseUpdateEvent'
        '409':
          $ref: '#/components/responses/409StandardErrorResponse'
        '412':
          $ref: '#/components/responses/412StandardErrorResponse'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

  /eventTypes:
    post:
      operationId: createEventType
      summary: Create new event type
      description: |
        Creates an event type with the provided content.
        - Default `id` is generated UUID. If `id` is provided then it has to be prefixed with the current tenant and has to be followed by a dot.
        - Default `parentId` is `BaseEvent`
        - Default `ttl` value is 35
        - Default `scope` is LOCAL
        - Default `filterable` value for a field is false
        - Default `required` value for a field is false
        - Default `updatable` value for a field is true
        - Clients must provide `values` field in case of ENUM type and must not provide in case of any other field type.

        \
        **!Restriction!**
        - **After successful response, it may take 100ms to make it visible to the user.**
      tags:
        - event types
      security:
        - eventType:
            - em.et.c
      parameters:
        - $ref: '#/components/parameters/includeShared'
      requestBody:
        description: Event type content to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventType'
      responses:
        '201':
          description: Created
          headers:
            Location:
              schema:
                type: string
              description: URL of the resource
            ETag:
              schema:
                type: string
              description: Incremental counter for optimistic concurrency control
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/EventTypeResponse'
        '400':
          $ref: '#/components/responses/400ErrorResponseCreateEventType'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '409':
          $ref: '#/components/responses/409ErrorResponseCreateEventType'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'
    get:
      operationId: queryEventTypes
      summary: Query event types
      description: |
        Returns event types based on the request parameters.

        \
        **!Note!**
        - **In case of sub-tenant user, global and related T1 local event types are also visible.**
      tags:
        - event types
      security:
        - eventType:
            - em.et.r
      parameters:
        - $ref: '#/components/parameters/sizeET'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/eventTypeFilter'
        - $ref: '#/components/parameters/eventTypeSort'
        - $ref: '#/components/parameters/ifNoneMatch'
        - $ref: '#/components/parameters/includeShared'
        - $ref: '#/components/parameters/excludeGlobal'
      responses:
        '200':
          description: A page of event types.
          headers:
            ETag:
              schema:
                type: string
              description: The hash of the response's content
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/QueryEventTypesResponse'
        '304':
          $ref: '#/components/responses/304StandardResponse'
        '400':
          $ref: '#/components/responses/400ErrorResponseGetEventType'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

  /eventTypes/{eventTypeId}:
    patch:
      operationId: updateEventType
      summary: Update an event type
      description: |
        Updates an event type by ID by only sending the changed content.

        \
        **!Restriction!**
        - **After successful response, it may take 100ms to make it visible to the user.**
      tags:
        - event types
      security:
        - eventType:
            - em.et.u
      parameters:
        - $ref: '#/components/parameters/eventTypeId'
        - $ref: '#/components/parameters/ifMatch'
        - $ref: '#/components/parameters/includeShared'
      requestBody:
        description: |
          New value for the given attribute or the field, that should be applied, depending on the *op* value. Structure is varying
            - If patch operation would modify attribute properties (*ttl*, *scope*, *required*) then *value* property of the patch content must be the type of the specified attribute (eg. *SCOPE*, *45*, *false*)
            - If patch operation would add new field then *value* property of the patch content must be an object describing field properties
            - If patch operation would add a new constant to an existing Enum field then *value* property must be a string of single new constant to add. Delete and update operation on existing constants of an Enum field is not supported.

                  Example 1:
                  {
                    "op": "replace",
                    "path": "/scope",
                    "value": "GLOBAL"
                  }

                  Example 2:
                  {
                    "op": "add",
                    "path": "/fields",
                    "value": {
                      "name": "newFieldName",
                      "updatable": false,
                      "type": "INTEGER"
                    }
                  }

                  Example 3:
                  {
                    "op": "replace",
                    "path": "/fields/originalField/required",
                    "value": false
                  }

                  Example 4:
                  {
                    "op": "add",
                    "path": "/fields/originalEnumField/values",
                    "value": "newConstantValue"
                  }
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventTypePatch'
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
              description: Incremental counter for optimistic concurrency control
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/EventTypeResponse'
        '400':
          $ref: '#/components/responses/400ErrorResponseUpdateEventType'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseUpdateEventType'
        '409':
          $ref: '#/components/responses/409ErrorResponseUpdateEventType'
        '412':
          $ref: '#/components/responses/412StandardErrorResponse'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

    get:
      operationId: retrieveEventType
      summary: Get an event type
      description: |
        Returns an event type by ID.

        \
        **!Note!**
        - **In case of sub-tenant user, global and related T1 local event types are also visible.**
      tags:
        - event types
      security:
        - eventType:
            - em.et.r
      parameters:
        - $ref: '#/components/parameters/eventTypeId'
        - $ref: '#/components/parameters/ifNoneMatch'
        - $ref: '#/components/parameters/includeShared'
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
              description: The hash of the response's content
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/EventTypeResponse'
        '304':
          $ref: '#/components/responses/304StandardResponse'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseGetEventTypeById'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

    delete:
      operationId: deleteEventType
      summary: Delete an event type
      description: |
        Delets an event type by ID.
      tags:
        - event types
      security:
        - eventType:
            - em.et.d
      parameters:
        - $ref: '#/components/parameters/eventTypeId'
        - $ref: '#/components/parameters/ifMatch'
        - $ref: '#/components/parameters/includeShared'
      responses:
        '204':
          description: NO CONTENT
        '400':
          $ref: '#/components/responses/400ErrorResponseDeleteEventType'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseDeleteEventTypeById'
        '409':
          $ref: '#/components/responses/409ErrorResponseDeleteEventType'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

  /deleteEventsJobs:
    post:
      operationId: createEventDeletionJob
      summary: Create a delete events job
      description: |
        Creates an asynchronous job which deletes events based on filter expression. Maximum 1.000.000 events can be deleted at once. The job status can be queried for 2 hours at most after the jobID is returned.
        If the latest event instance in a history of an event is deleted then the history of the event will be deleted.

        \
        **!Restriction!**
        Job will result in `FINISHED_WITH_ERROR` state in cases you can find below
        - **Concurrent event deletion on the same event type is not allowed.**
        - **Concurrent event deletion and event type modification for the same event type is not allowed.**
      security:
        - event:
            - em.d
          job:
            - em.dej.c
          eventType:
            - em.et.r
      tags:
        - jobs
      requestBody:
        description: Operation content to perform asynchronous delete events job
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deleteEventsJob'
      responses:
        '202':
          description: ACCEPTED
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/JobResource'
        '400':
          $ref: '#/components/responses/400ErrorResponseBulkDeleteEvent'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

  /deleteEventsJobs/{jobId}:
    get:
      operationId: retrieveEventDeletionJob
      summary: Get a delete events job
      description: |
        Returns a delete events job state by ID.
      tags:
        - jobs
      security:
        - job:
            - em.dej.r
      parameters:
        - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/DeleteJobResource'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseGetJobById'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

  /createEventsJobs:
    post:
      operationId: createEventCreationJob
      summary: Create a create events job
      description: |
        Creates an asynchronous job which creates events with the provided content. Maximum 150 events can be created at once. The job status can be queried for 2 hours at most after the jobID is returned.
      security:
        - event:
            - em.c
          job:
            - em.cej.c
          eventType:
            - em.et.r
      tags:
        - jobs
      requestBody:
        description: Operation content to perform asynchronous create events job
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createEventsJob'
      responses:
        '202':
          description: ACCEPTED
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/JobResource'
        '400':
          $ref: '#/components/responses/400ErrorResponseBulkCreateEvent'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

  /createEventsJobs/{jobId}:
    get:
      operationId: retrieveEventCreationJob
      summary: Get a create events job
      description: |
        Returns a create events job state by ID.
      tags:
        - jobs
      security:
        - job:
            - em.cej.r
      parameters:
        - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/CreateJobResource'
        '401':
          $ref: '#/components/responses/401StandardErrorResponse'
        '403':
          $ref: '#/components/responses/403ErrorForbiddenResponse'
        '404':
          $ref: '#/components/responses/404ErrorResponseGetJobById'
        '429':
          $ref: '#/components/responses/429StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500StandardErrorResponse'

components:
  schemas:
    InfoResponse:
      type: object
      properties:
        self:
          type: object
          properties:
            href:
              type: string
              format: uri
              example: 'https://advanced-eventmanagement.mindsphere.io/api/v3'
        events:
          type: object
          properties:
            href:
              type: string
              format: uri
              example: 'https://advanced-eventmanagement.mindsphere.io/api/v3/events{?filter}'
            templated:
              type: boolean
              example: true
        eventTypes:
          properties:
            href:
              type: string
              format: uri
              example: 'https://advanced-eventmanagement.mindsphere.io/api/v3/eventTypes{?filter}'
            templated:
              type: boolean
              example: true
        deleteEventsJobs:
          properties:
            href:
              type: string
              format: uri
              example: 'https://advanced-eventmanagement.mindsphere.io/api/v3/deleteEventsJobs'
            templated:
              type: boolean
              example: true
        createEventsJobs:
          properties:
            href:
              type: string
              format: uri
              example: 'https://advanced-eventmanagement.mindsphere.io/api/v3/createEventsJobs'
            templated:
              type: boolean
              example: true

    BaseEventResponse:
      type: object
      required:
        - id
        - typeId
        - correlationId
        - timestamp
        - entityId
        - etag
        - _links
      properties:
        id:
          description: Unique identifier of the event
          type: string
          format: uuid
        typeId:
          description: Unique identifier of the event type (filterable, not updatable)
          type: string
        correlationId:
          description: Correlation ID of the event. It can be used to group related events (filterable, not updatable)
          type: string
          format: uuid
        timestamp:
          description: Timestamp attached to the event in UTC format (filterable, not updatable)
          type: string
        entityId:
          description: Entity attached to the event (filterable, not updatable)
          type: string
          format: uuid
        etag:
          type: integer
          format: int64
          description: Incremental counter for optimistic concurrency control
        sharing:
          $ref: '#/components/schemas/SharingResource'
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/rel.self'

    BaseEvent:
      type: object
      required:
        - timestamp
        - entityId
      properties:
        typeId:
          description: Unique identifier of the event type (filterable, not updatable)
          type: string
        correlationId:
          description: Correlation ID of the event. It can be used to group related events (filterable, not updatable)
          type: string
          format: uuid
        timestamp:
          description: Timestamp attached to the event in UTC format (filterable, not updatable)
          type: string
        entityId:
          description: Entity attached to the event (filterable, not updatable)
          type: string
          format: uuid

    MindsphereStandardEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            severity:
              type: integer
              minimum: 1
              maximum: 99
            description:
              type: string
              maxLength: 255
            code:
              type: string
              maxLength: 16
            source:
              type: string
              maxLength: 255
            acknowledged:
              type: boolean

    MindsphereStandardEventResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEventResponse'
        - type: object
          properties:
            severity:
              type: integer
              minimum: 1
              maximum: 99
            description:
              type: string
              maxLength: 255
            code:
              type: string
              maxLength: 16
            source:
              type: string
              maxLength: 255
            acknowledged:
              type: boolean

    CustomEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          additionalProperties:
            type: string
            description: A custom field. An event can have multiple custom fields according to its event type. The field type can be string, integer, double, boolean, link, timestamp.

    CustomEventResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEventResponse'
        - type: object
          additionalProperties:
            type: string
            description: A custom field. An event can have multiple custom fields according to its event type. The field type can be string, integer, double, boolean, link, timestamp.

    CustomEventUpdated:
      allOf:
        - $ref: '#/components/schemas/BaseEventResponse'
        - type: object
          additionalProperties:
            type: string
            description: A custom field. An event can have multiple custom fields according to its event type. The field type can be string, integer, double, boolean, link, timestamp.

    CustomEventCreated:
      allOf:
        - $ref: '#/components/schemas/BaseEventResponse'
        - type: object
          additionalProperties:
            type: string
            description: A custom field. An event can have multiple custom field according to its type. It can be string, integer, double, boolean, link, timestamp.
      example:
        {
          "id": "ae71ee1b-3454-4338-8def-a16028db08b0",
          "typeId": "3cb8c2b1-f72e-43fa-ae39-ee9de14b8f26",
          "correlationId": "3ecc3658-96bb-47ff-93b3-93afd640ee10",
          "entityId": "50fd8ab5-23b3-45f7-aca1-12b0b186707b",
          "timestamp": "2018-01-09T13:40:23.438Z",
          "etag": 0,
          "sharing": {
            "modes": [
            "SHARER"
            ]
          },
          "_links": {
