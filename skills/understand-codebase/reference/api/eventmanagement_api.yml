        - id
        - name
        - parentId
        - ttl
        - etag
        - owner
        - scope
        - fields
        - _links
      properties:
        id:
          description: ID of the created event type
          type: string
        name:
          description: Name of the event type
          type: string
        parentId:
          description: Parent event type ID
          type: string
        ttl:
          description: Time to live in days
          type: integer
        etag:
          type: integer
          format: int64
        owner:
          description: The owner who created the event type
          type: string
        scope:
          description: Scope of the event type
          type: string
          enum: [LOCAL, GLOBAL]
          default: LOCAL
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Field'
        sharing:
          $ref: '#/components/schemas/SharingResource'
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/rel.self'
            events:
              $ref: '#/components/schemas/rel.events'


    EventTypePatch:
