        - op
        - path
        - value
      properties:
        op:
          description: Type of the operation to be made
          enum: [add, replace]
          type: string
        path:
          description: Identifying a specific attribute/field whereon the operation should be made
          type: string
        value:
          description: New value for the given attribute or the field, that should be added, depending on the *op* value
          type: string
      example:
        {
          "op": "replace",
          "path": "/fields/originalField/name",
          "value": "newFieldName"
        }
    QueryEventTypesResponse:
      type: object
      properties:
        _embedded:
          type: object
          properties:
            eventTypes:
              type: array
